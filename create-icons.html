<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CORTEX — Icon Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&family=Lora:wght@700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: 'DM Sans', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 40px;
    }

    h1 {
      font-family: 'Lora', Georgia, serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 8px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 0%, #888 50%, #fff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 11px;
      letter-spacing: 4px;
      color: #444;
      margin-bottom: 50px;
      text-transform: uppercase;
    }

    .preview-section {
      display: flex;
      gap: 40px;
      align-items: flex-end;
      margin-bottom: 50px;
    }

    .preview-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .preview-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: #333;
      text-transform: uppercase;
    }

    .preview-canvas {
      border: 1px solid #222;
      border-radius: 12px;
      background: #0a0a0a;
    }

    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 40px;
    }

    button {
      padding: 14px 28px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255,255,255,0.2);
    }

    button:active {
      transform: scale(0.98);
    }

    button.download-all {
      background: linear-gradient(135deg, #fff 0%, #ccc 100%);
      padding: 16px 40px;
    }

    .instructions {
      max-width: 500px;
      text-align: center;
      margin-top: 20px;
    }

    .instructions p {
      font-size: 12px;
      color: #444;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }

    .instructions code {
      background: #111;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'SF Mono', monospace;
      font-size: 11px;
      color: #888;
    }

    .checkmark {
      display: inline-block;
      margin-left: 8px;
      color: #4f4;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .checkmark.show {
      opacity: 1;
    }

    .icon-styles {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
    }

    .style-btn {
      padding: 10px 20px;
      background: #111;
      border: 1px solid #222;
      color: #555;
      font-size: 10px;
    }

    .style-btn.active {
      background: #fff;
      color: #000;
      border-color: #fff;
    }
  </style>
</head>
<body>

  <h1>CORTEX</h1>
  <p class="subtitle">Icon Generator</p>

  <div class="icon-styles">
    <button class="style-btn active" data-style="minimal">MINIMAL</button>
    <button class="style-btn" data-style="bold">BOLD</button>
    <button class="style-btn" data-style="glow">GLOW</button>
  </div>

  <div class="preview-section">
    <div class="preview-box">
      <canvas id="preview-128" class="preview-canvas" width="128" height="128"></canvas>
      <span class="preview-label">128 × 128</span>
    </div>
    <div class="preview-box">
      <canvas id="preview-48" class="preview-canvas" width="48" height="48"></canvas>
      <span class="preview-label">48 × 48</span>
    </div>
    <div class="preview-box">
      <canvas id="preview-16" class="preview-canvas" width="16" height="16"></canvas>
      <span class="preview-label">16 × 16</span>
    </div>
  </div>

  <div class="buttons">
    <button onclick="downloadIcon(16)">
      Download 16px
      <span class="checkmark" id="check-16">✓</span>
    </button>
    <button onclick="downloadIcon(48)">
      Download 48px
      <span class="checkmark" id="check-48">✓</span>
    </button>
    <button onclick="downloadIcon(128)">
      Download 128px
      <span class="checkmark" id="check-128">✓</span>
    </button>
  </div>

  <div class="buttons">
    <button class="download-all" onclick="downloadAll()">
      Download All Icons
    </button>
  </div>

  <div class="instructions">
    <p>
      After downloading, place all icons in:<br/>
      <code>cortex/icons/</code>
    </p>
  </div>

  <script>
    let currentStyle = 'minimal';

    /* ================================================
     *  ICON DRAWING FUNCTIONS
     * ================================================ */

    function drawIcon(size, style = 'minimal') {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const scale = size / 128;
      const r = 24 * scale;  // corner radius

      // === BACKGROUND ===
      ctx.beginPath();
      roundRect(ctx, 0, 0, size, size, r);
      
      if (style === 'glow') {
        const grad = ctx.createRadialGradient(
          size * 0.3, size * 0.3, 0,
          size * 0.5, size * 0.5, size * 0.8
        );
        grad.addColorStop(0, '#1a1a1a');
        grad.addColorStop(1, '#000000');
        ctx.fillStyle = grad;
      } else {
        ctx.fillStyle = '#000000';
      }
      ctx.fill();

      // === BORDER ===
      ctx.beginPath();
      roundRect(ctx, 0.5, 0.5, size - 1, size - 1, r);
      ctx.strokeStyle = style === 'glow' ? '#333' : '#222';
      ctx.lineWidth = Math.max(1, 2 * scale);
      ctx.stroke();

      // === "C" LETTER ===
      const fontSize = size * 0.52;
      ctx.font = `${style === 'bold' ? '700' : '600'} ${fontSize}px "DM Sans", system-ui, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if (style === 'glow') {
        // Glow effect
        ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
        ctx.shadowBlur = 20 * scale;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;
      }

      if (style === 'bold') {
        // Gradient text for bold
        const textGrad = ctx.createLinearGradient(
          size * 0.25, size * 0.3,
          size * 0.75, size * 0.7
        );
        textGrad.addColorStop(0, '#ffffff');
        textGrad.addColorStop(0.5, '#cccccc');
        textGrad.addColorStop(1, '#ffffff');
        ctx.fillStyle = textGrad;
      } else {
        ctx.fillStyle = '#ffffff';
      }

      ctx.fillText('C', size * 0.48, size * 0.52);

      // Reset shadow
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;

      // === DIAMOND ACCENT ===
      const dx = size * 0.78;
      const dy = size * 0.22;
      const ds = size * 0.055;

      ctx.beginPath();
      ctx.moveTo(dx, dy - ds);
      ctx.lineTo(dx + ds, dy);
      ctx.lineTo(dx, dy + ds);
      ctx.lineTo(dx - ds, dy);
      ctx.closePath();

      if (style === 'glow') {
        ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
        ctx.shadowBlur = 8 * scale;
      }

      ctx.fillStyle = '#ffffff';
      ctx.fill();

      // === SUBTLE INNER HIGHLIGHT (for depth) ===
      if (style !== 'minimal' && size >= 48) {
        ctx.beginPath();
        roundRect(ctx, 2 * scale, 2 * scale, size - 4 * scale, size * 0.5, r * 0.8);
        const highlightGrad = ctx.createLinearGradient(0, 0, 0, size * 0.5);
        highlightGrad.addColorStop(0, 'rgba(255,255,255,0.03)');
        highlightGrad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = highlightGrad;
        ctx.fill();
      }

      return canvas;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    /* ================================================
     *  PREVIEW RENDERING
     * ================================================ */

    function renderPreviews() {
      [128, 48, 16].forEach(size => {
        const preview = document.getElementById(`preview-${size}`);
        const ctx = preview.getContext('2d');
        ctx.clearRect(0, 0, size, size);
        
        const icon = drawIcon(size, currentStyle);
        ctx.drawImage(icon, 0, 0);
      });
    }

    /* ================================================
     *  DOWNLOAD FUNCTIONS
     * ================================================ */

    function downloadIcon(size) {
      const canvas = drawIcon(size, currentStyle);
      const link = document.createElement('a');
      link.download = `icon${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();

      // Show checkmark
      const check = document.getElementById(`check-${size}`);
      check.classList.add('show');
      setTimeout(() => check.classList.remove('show'), 2000);
    }

    function downloadAll() {
      [16, 48, 128].forEach((size, i) => {
        setTimeout(() => downloadIcon(size), i * 300);
      });
    }

    /* ================================================
     *  STYLE SWITCHER
     * ================================================ */

    document.querySelectorAll('.style-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentStyle = btn.dataset.style;
        renderPreviews();
      });
    });

    /* ================================================
     *  INIT
     * ================================================ */

    // Load font then render
    document.fonts.ready.then(() => {
      renderPreviews();
    });

    // Fallback
    setTimeout(renderPreviews, 500);
  </script>

</body>
</html>
